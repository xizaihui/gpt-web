<body class="dark:bg-black">
	<div id="app">
		<style>
			.loading-wrap {
				display: flex;
				justify-content: center;
				align-items: center;
				height: 100vh;
				background: #fff;
			}
			.loading-wrap .dots {
				display: flex;
				gap: 6px;
			}
			.loading-wrap .dot {
				width: 10px;
				height: 10px;
				border-radius: 50%;
				background: #b4b4b4;
				animation: dot-pulse 1.2s ease-in-out infinite;
			}
			.loading-wrap .dot:nth-child(2) { animation-delay: 0.2s; }
			.loading-wrap .dot:nth-child(3) { animation-delay: 0.4s; }
			@keyframes dot-pulse {
				0%, 80%, 100% { opacity: 0.3; transform: scale(0.85); }
				40% { opacity: 1; transform: scale(1); }
			}
			@media (prefers-color-scheme: dark) {
				body { background: #121212; }
				.loading-wrap { background: #121212; }
				.loading-wrap .dot { background: #666; }
			}
		</style>
		<div class="loading-wrap">
			<div class="dots">
				<div class="dot"></div>
				<div class="dot"></div>
				<div class="dot"></div>
			</div>
		</div>
	</div>
	
</body>
